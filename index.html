<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;height:100%;overflow:hidden;}
  canvas{display:block;}
</style></head><body>
<canvas id="c"></canvas>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const DPR = window.devicePixelRatio || 1;

const DEFAULTS = {
  accent: '#7c5cff',
  background: '#0a0a0f',
  refreshMs: 5000,
  tagColors: {},
  linkOpacity: 0.18,
  nodeGlow: true
};
let cfg = {...DEFAULTS};
let sim, nodes=[], links=[], lastHash='';
let maxDeg = 1;
let tick = 0;

function applyBackground(){ document.body.style.background = cfg.background; }

function resize(){
  canvas.width=innerWidth*DPR; canvas.height=innerHeight*DPR;
  canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px';
  ctx.setTransform(1,0,0,1,0,0); ctx.scale(DPR,DPR);
}
resize(); addEventListener('resize',resize);

function hexToRGB(h){const n=parseInt(h.slice(1),16);return [n>>16&255,n>>8&255,n&255];}
function rgba(r,g,b,a){return `rgba(${r},${g},${b},${a})`;}
function hex2rgba(h,a){const [r,g,b]=hexToRGB(h);return rgba(r,g,b,a);}

function nodeColor(n){ return (n.tag && cfg.tagColors[n.tag]) || cfg.accent; }

async function loadFile(name){
  try {
    const r = await fetch(name+'?'+Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch(e){
    return new Promise(resolve => {
      try {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', name, true);
        xhr.onload = () => { try { resolve(JSON.parse(xhr.responseText)); } catch(e) { resolve(null); } };
        xhr.onerror = () => resolve(null);
        xhr.send();
      } catch(e) { resolve(null); }
    });
  }
}

async function loadCfg(){
  const data = await loadFile('config.json');
  if (data) {
    cfg = {...DEFAULTS, ...data};
  } else {
    console.warn('config.json not found or invalid, using defaults');
  }
  applyBackground();
}

async function load(){
  try {
    const d = await loadFile('graph.json');
    if (!d?.nodes || !d?.links) return;
    const h = JSON.stringify(d.nodes.map(n=>n.id+'|'+(n.tag||'')).sort());
    if (h===lastHash) return; lastHash=h;
    const map = new Map(nodes.map(n=>[n.id,n]));
    const spread = Math.min(innerWidth, innerHeight) * 0.4;
    nodes = d.nodes.map(n=>{
      const prev = map.get(n.id);
      return prev ? Object.assign(prev, {tag:n.tag}) : {...n, x:innerWidth/2+(Math.random()-.5)*spread, y:innerHeight/2+(Math.random()-.5)*spread};
    });
    links = d.links;
    const deg={}; links.forEach(l=>{deg[l.source]=(deg[l.source]||0)+1;deg[l.target]=(deg[l.target]||0)+1;});
    maxDeg = Math.max(1, ...Object.values(deg));
    nodes.forEach(n=>{
      const d = deg[n.id]||0;
      n.deg = d;
      n.r = 2 + Math.sqrt(d) * 1.5;
      // Importance: 0..1 based on degree
      n.importance = Math.min(1, d / maxDeg);
    });
    if (sim) sim.stop();
    const count = nodes.length;
    const charge = count > 200 ? -15 : count > 50 ? -25 : -30;
    const dist = count > 200 ? 30 : 40;
    sim = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d=>d.id).distance(dist).strength(0.3))
      .force('charge', d3.forceManyBody().strength(charge))
      .force('center', d3.forceCenter(innerWidth/2, innerHeight/2))
      .force('collide', d3.forceCollide().radius(d=>d.r+2))
      .alphaDecay(0.02).velocityDecay(0.6).on('tick', draw);
  } catch(e){ console.warn('load failed:', e.message); }
}

// Ambient breathing — keeps it alive after simulation cools
function breathe(){
  tick++;
  if (sim && sim.alpha() < 0.01) {
    // Gentle nudge to keep nodes drifting
    nodes.forEach(n => {
      const phase = tick * 0.003 + n.x * 0.001 + n.y * 0.001;
      n.vx += Math.sin(phase) * 0.02;
      n.vy += Math.cos(phase * 0.7) * 0.02;
    });
    sim.alpha(0.008);
    sim.restart();
  }
  requestAnimationFrame(breathe);
}

function draw(){
  ctx.clearRect(0,0,innerWidth,innerHeight);

  // === Edges ===
  links.forEach(l=>{
    const sx=l.source.x, sy=l.source.y, tx=l.target.x, ty=l.target.y;
    // Edge opacity scales with endpoint importance
    const imp = Math.max(l.source.importance||0, l.target.importance||0);
    const alpha = cfg.linkOpacity * (0.3 + imp * 0.7);
    ctx.strokeStyle = hex2rgba(cfg.accent, alpha);
    ctx.lineWidth = 0.4 + imp * 0.6;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(tx, ty);
    ctx.stroke();
  });

  // === Nodes ===
  nodes.forEach(n=>{
    const c = nodeColor(n);
    const [cr,cg,cb] = hexToRGB(c);
    const imp = n.importance || 0;
    const breathPhase = Math.sin(tick * 0.015 + n.x * 0.005) * 0.5 + 0.5;

    if (cfg.nodeGlow) {
      // Outer glow — larger for important nodes, pulses gently
      const glowR = n.r + 4 + imp * 12 + breathPhase * 2;
      const glowAlpha = 0.08 + imp * 0.15 + breathPhase * 0.03;
      const g = ctx.createRadialGradient(n.x, n.y, n.r * 0.5, n.x, n.y, glowR);
      g.addColorStop(0, rgba(cr, cg, cb, glowAlpha));
      g.addColorStop(1, rgba(cr, cg, cb, 0));
      ctx.beginPath();
      ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    }

    // Core node — brighter center, opacity based on importance
    const coreAlpha = 0.55 + imp * 0.35 + breathPhase * 0.1;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = rgba(cr, cg, cb, coreAlpha);
    ctx.fill();

    // Hot center dot for hub nodes
    if (imp > 0.3) {
      const dotR = n.r * 0.4;
      ctx.beginPath();
      ctx.arc(n.x, n.y, dotR, 0, Math.PI * 2);
      ctx.fillStyle = rgba(
        Math.min(255, cr + 80),
        Math.min(255, cg + 80),
        Math.min(255, cb + 80),
        0.7 + breathPhase * 0.3
      );
      ctx.fill();
    }
  });
}

applyBackground();
(async()=>{
  await loadCfg(); await load();
  breathe();
  setInterval(load, cfg.refreshMs);
  setInterval(async()=>{
    const prev = JSON.stringify(cfg);
    await loadCfg();
    if (JSON.stringify(cfg) !== prev) { lastHash=''; await load(); }
  }, 2000);
})();
</script></body></html>
