name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Provides a Chrome binary so the renderer smoke test (scripts/smoke-render.js)
      # runs for real instead of skipping.
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v2
        id: setup-chrome

      - name: Run tests
        env:
          CHROME: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm test
