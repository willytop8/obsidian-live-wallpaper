version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Minor/patch bumps land as one PR; majors (which can carry breaking
      # runtime requirements, e.g. chokidar 5 needing Node >=20.19) stay
      # individual so they get a deliberate look.
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      # All action bumps as one PR instead of one PR per action (the 5
      # separate Dependabot PRs merged in this cleanup would have been one).
      github-actions:
        patterns:
          - '*'
